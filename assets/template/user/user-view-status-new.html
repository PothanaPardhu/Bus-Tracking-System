{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bus Tracking Status</title>
    <link rel="stylesheet" type="text/css" href="{% static 'user/css/bootstrap.css' %}" />
    <link href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">
    <link href="{% static 'user/css/style.css' %}" rel="stylesheet" />
    <link href="{% static 'user/css/responsive.css' %}" rel="stylesheet" />
    <link href="{% static 'user/css/style1.css' %}" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }

        .main-container { display: flex; flex-direction: column; min-height: 100vh; }
        .content-area { flex: 1; padding: 20px; }
        .tracker-wrapper { max-width: 1200px; margin: 0 auto; }
        
        .tracker-header {
            background: white; border-radius: 8px; padding: 20px;
            margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header-title {
            font-size: 24px; font-weight: 700; color: #333; margin-bottom: 15px;
            display: flex; align-items: center; gap: 10px;
        }
        
        .badge-live {
            display: inline-block; background: #4caf50; color: white;
            padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .search-controls {
            display: grid; grid-template-columns: 1fr 1fr 100px; gap: 12px;
            align-items: end;
        }

        @media (max-width: 768px) {
            .search-controls { grid-template-columns: 1fr; }
        }

        .form-group { display: flex; flex-direction: column; }
        .form-group label {
            font-weight: 600; color: #555; margin-bottom: 6px; font-size: 12px;
        }
        
        .form-group input, .form-group select {
            padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
            font-size: 13px; transition: border-color 0.3s; font-family: inherit;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #667eea; background: #f9f9ff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 10px 20px; border: none; border-radius: 6px;
            cursor: pointer; font-weight: 600; font-size: 13px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }

        .info-panel {
            background: white; border-radius: 8px; padding: 15px;
            margin: 15px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .info-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px; margin-bottom: 12px;
        }

        .info-item {
            background: #f9f9f9; padding: 12px; border-radius: 6px; border-left: 3px solid #667eea;
        }

        .info-item .label { font-size: 11px; color: #999; text-transform: uppercase; font-weight: 600; }
        .info-item .value { font-size: 18px; font-weight: 700; color: #333; margin-top: 4px; }

        .map-container {
            background: white; border-radius: 8px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin: 20px 0;
            position: relative; height: 60vh;
        }

        #map { width: 100%; height: 100%; }

        .map-controls {
            position: absolute; bottom: 15px; left: 15px; z-index: 999;
            background: white; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            padding: 8px; display: flex; flex-direction: column; gap: 6px;
        }

        .control-btn {
            width: 40px; height: 40px; border: none; border-radius: 6px;
            background: #667eea; color: white; cursor: pointer; font-size: 14px;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center;
        }

        .control-btn:hover {
            background: #764ba2; transform: scale(1.05);
        }

        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 600;
        }

        .status-active { background: #c8e6c9; color: #2e7d32; }
        .status-idle { background: #ffe0b2; color: #e65100; }
    </style>
</head>

<body class="main-container">
    <div class="top_container sub_pages">
        <header class="header_section">
          <div class="container">
            <nav class="navbar navbar-expand-lg custom_nav-container">
              <a class="navbar-brand" href="{% url 'user_index' %}">
                <img src="{% static 'user/images/logo.png' %}" alt="">
                <span>School Bus Tracking</span>
              </a>
              <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <div class="d-flex ml-auto flex-column flex-lg-row align-items-center">
                  <ul class="navbar-nav">
                    <li class="nav-item active">
                      <a class="nav-link " href="{% url 'user_index' %}"> Home </a>
                    </li>
                    <li class="nav-item ">
                      <a class="nav-link " href="{% url 'user_about' %}"> About </a>
                    </li>
                    <li class="nav-item active ">
                      <a class="nav-link" href="{% url 'user_myprofile' %}"> My profile</a>
                    </li>
                    <li class="nav-item active ">
                        <a class="nav-link" href="{% url 'user_changepassword' %}"> Change Password</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="{% url 'user_view_status' %}"> <i class="fa fa-map-marker"></i> Track Bus</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="{% url 'notification_status' %}"> Notification</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="{% url 'user_feedback' %}"> FeedBack</a>
                    </li>
                    <li class="nav-item">
                      <a class="nav-link" href="{% url 'main_index' %}">Logout</a>
                    </li>
                  </ul>
                </div>
            </nav>
          </div>
        </header>
    </div>

    <div class="content-area">
        <div class="tracker-wrapper">
            <!-- Header -->
            <div class="tracker-header">
                <div class="header-title">
                    <i class="fa fa-bus" style="color: #667eea;"></i>
                    Bus Tracking Status
                    <span class="badge-live">LIVE</span>
                </div>

                <!-- Search Controls -->
                <div class="search-controls">
                    <div class="form-group">
                        <label for="busInput">Bus Number</label>
                        <input type="text" id="busInput" placeholder="Enter bus ID or number" />
                    </div>
                    <div class="form-group">
                        <label for="destInput">Destination</label>
                        <select id="destInput">
                            <option value="">-- Select --</option>
                            <option value="school">School</option>
                            <option value="home">Home</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-primary" id="trackBtn" style="flex: 1;"><i class="fa fa-search"></i> Track</button>
                        <button class="btn-primary" id="demoBtn" style="background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%); color: #333; flex: 1;"><i class="fa fa-play"></i> Demo</button>
                    </div>
                </div>
            </div>

            <!-- Info Panel -->
            <div class="info-panel">
                <div class="info-row">
                    <div class="info-item">
                        <div class="label">Bus Number</div>
                        <div class="value" id="displayBusNumber">--</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Current Speed</div>
                        <div class="value" id="displaySpeed">0 km/h</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Status</div>
                        <div class="value">
                            <span class="status-badge status-active" id="displayStatus">Active</span>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="label">Last Update</div>
                        <div class="value" id="displayTime">--:--</div>
                    </div>
                </div>
            </div>

            <!-- Map -->
            <div class="map-container">
                <div id="map"></div>
                
                <div class="map-controls">
                    <button class="control-btn" id="zoomIn" title="Zoom In"><i class="fa fa-plus"></i></button>
                    <button class="control-btn" id="zoomOut" title="Zoom Out"><i class="fa fa-minus"></i></button>
                    <button class="control-btn" id="centerMap" title="Center on Bus"><i class="fa fa-crosshairs"></i></button>
                    <button class="control-btn" id="refresh" title="Refresh"><i class="fa fa-refresh"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // State Management
        let tracker = {
            map: null,
            marker: null,
            busId: null,
            isDemo: false,
            pollInterval: null,
            demoIndex: 0,
            demoRoute: [
                { lat: 20.5937, lng: 78.9629, speed: 0, status: 'Waiting' },
                { lat: 20.594, lng: 78.965, speed: 15, status: 'Moving' },
                { lat: 20.595, lng: 78.968, speed: 25, status: 'Moving' },
                { lat: 20.598, lng: 78.975, speed: 32, status: 'On Route' },
                { lat: 20.602, lng: 78.980, speed: 28, status: 'Approaching' }
            ]
        };

        const DEFAULT_LAT = {{ initial_lat|default:20.5937 }};
        const DEFAULT_LNG = {{ initial_lng|default:78.9629 }};
        const ASSIGNED_BUS = {{ bus_id|default:'null' }};

        // Initialize Map
        function initializeMap() {
            tracker.map = L.map('map').setView([DEFAULT_LAT, DEFAULT_LNG], 12);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(tracker.map);

            setupMapButtons();
        }

        // Map Button Controls
        function setupMapButtons() {
            document.getElementById('zoomIn').onclick = () => tracker.map.zoomIn();
            document.getElementById('zoomOut').onclick = () => tracker.map.zoomOut();
            document.getElementById('centerMap').onclick = () => {
                if (tracker.marker) tracker.map.setView(tracker.marker.getLatLng(), 14);
            };
            document.getElementById('refresh').onclick = loadBusData;
        }

        // Create Bus Marker
        function createMarker(lat, lng, heading = 0) {
            const svg = `
                <svg width="36" height="36" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 8 L80 45 L75 45 L75 75 Q50 88 25 75 L25 45 L20 45 Z" fill="#FF6B35"/>
                    <circle cx="35" cy="65" r="5" fill="#333"/>
                    <circle cx="65" cy="65" r="5" fill="#333"/>
                </svg>`;

            const icon = L.divIcon({
                html: `<div style="transform: rotate(${heading}deg); transition: transform 0.3s;">${svg}</div>`,
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });

            if (tracker.marker) {
                tracker.marker.setLatLng([lat, lng]);
            } else {
                tracker.marker = L.marker([lat, lng], { icon: icon }).addTo(tracker.map);
            }
            
            tracker.map.panTo([lat, lng], { animate: true, duration: 1 });
        }

        // Update Display
        function updateDisplay(busNum, speed, status) {
            document.getElementById('displayBusNumber').textContent = busNum;
            document.getElementById('displaySpeed').textContent = speed + ' km/h';
            document.getElementById('displayStatus').textContent = status;
            document.getElementById('displayTime').textContent = new Date().toLocaleTimeString();
        }

        // Load Bus Data
        async function loadBusData() {
            if (tracker.isDemo) {
                const route = tracker.demoRoute[tracker.demoIndex++ % tracker.demoRoute.length];
                createMarker(route.lat, route.lng, (tracker.demoIndex % 8) * 45);
                updateDisplay('DEMO-BUS-001', route.speed, route.status);
                return;
            }

            if (!tracker.busId) return;

            try {
                const resp = await fetch(`/api/v1/tracking/bus/status/?bus_id=${tracker.busId}`);
                if (!resp.ok) throw new Error('API error');
                const data = await resp.json();
                
                if (data.latest_location) {
                    createMarker(data.latest_location.latitude, data.latest_location.longitude, data.latest_location.heading || 0);
                    updateDisplay(data.bus_number, data.latest_location.speed || 0, data.status || 'Active');
                }
            } catch (e) {
                console.error('Error:', e);
            }
        }

        // Event Listeners
        document.getElementById('trackBtn').onclick = async () => {
            const busNum = document.getElementById('busInput').value.trim();
            if (!busNum) {
                alert('Enter a bus number');
                return;
            }

            tracker.isDemo = false;
            try {
                const resp = await fetch(`/api/v1/tracking/buses/?search=${encodeURIComponent(busNum)}`);
                const buses = await resp.json();
                if (!buses || buses.length === 0) {
                    alert('Bus not found');
                    return;
                }
                tracker.busId = buses[0].bus_id || buses[0].id;
                if (tracker.pollInterval) clearInterval(tracker.pollInterval);
                loadBusData();
                tracker.pollInterval = setInterval(loadBusData, 3000);
            } catch (e) {
                alert('Error: ' + e.message);
            }
        };

        document.getElementById('demoBtn').onclick = () => {
            tracker.isDemo = true;
            tracker.busId = null;
            if (tracker.pollInterval) clearInterval(tracker.pollInterval);
            document.getElementById('busInput').value = 'DEMO-BUS-001';
            tracker.demoIndex = 0;
            tracker.pollInterval = setInterval(loadBusData, 2000);
            loadBusData();
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initializeMap();
            if (ASSIGNED_BUS && ASSIGNED_BUS !== 'null') {
                tracker.busId = ASSIGNED_BUS;
                loadBusData();
                tracker.pollInterval = setInterval(loadBusData, 3000);
            }
        });

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (tracker.pollInterval) clearInterval(tracker.pollInterval);
        });
    </script>
</body>
</html>
