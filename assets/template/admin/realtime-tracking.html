<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Bus Tracking Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 350px;
            background: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .status-badge {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }

        .bus-list {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .bus-item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .bus-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .bus-item.active {
            background: #e8eaf6;
            border-left-color: #764ba2;
        }

        .bus-number {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .bus-info {
            font-size: 12px;
            color: #666;
            margin: 5px 0;
        }

        .bus-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 8px;
        }

        .bus-status.active {
            background: #4caf50;
            color: white;
        }

        .bus-status.idle {
            background: #ff9800;
            color: white;
        }

        .bus-status.ended {
            background: #f44336;
            color: white;
        }

        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .map-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        .control-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px 0;
            display: block;
            width: 100%;
            font-size: 14px;
            transition: background 0.3s;
        }

        .control-button:hover {
            background: #764ba2;
        }

        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            max-width: 300px;
            z-index: 1000;
        }

        .info-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 13px;
            color: #666;
        }

        .info-item-label {
            font-weight: semi-bold;
        }

        .info-item-value {
            color: #333;
        }

        .marker-popup {
            background: white;
            padding: 15px;
            border-radius: 4px;
            max-width: 250px;
        }

        .marker-popup h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .marker-popup p {
            margin: 5px 0;
            font-size: 13px;
            color: #666;
        }

        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .route-path {
            stroke: #667eea;
            stroke-width: 2;
            fill: none;
            opacity: 0.7;
        }

        .no-buses {
            padding: 20px;
            text-align: center;
            color: #999;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 40vh;
            }

            .map-container {
                height: 60vh;
            }
        }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 20px 20px;
            border-top: 1px solid #eee;
        }

        .stat-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="header">
                <h1><i class="fas fa-bus"></i> Bus Tracker</h1>
                <div class="status-badge">
                    <span class="live-indicator"></span>Real-time Tracking
                </div>
            </div>

            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-value" id="activeCount">0</div>
                    <div class="stat-label">Active Buses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="childrenCount">0</div>
                    <div class="stat-label">Children Tracked</div>
                </div>
            </div>

            <div class="bus-list">
                <div id="busList"></div>
                <div class="no-buses" id="noBuses" style="display: none;">
                    <p>No active buses</p>
                </div>
            </div>
        </div>

        <!-- Map -->
        <div class="map-container">
            <div id="map"></div>

            <!-- Map Controls -->
            <div class="map-controls">
                <button class="control-button" onclick="centerMap()">
                    <i class="fas fa-crosshairs"></i> Center Map
                </button>
                <button class="control-button" onclick="toggleRoutes()">
                    <i class="fas fa-route"></i> Toggle Routes
                </button>
                <button class="control-button" onclick="refreshData()">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>

            <!-- Info Panel -->
            <div class="info-panel" id="infoPanel" style="display: none;">
                <div class="info-title" id="infoPanelTitle"></div>
                <div id="infoPanelContent"></div>
            </div>
        </div>
    </div>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <script>
        // Global state
        let map, busMarkers = {}, routePolylines = {}, selectedBusId = null;
        let showRoutes = true;
        let busData = {};

        // Initialize map
        function initializeMap() {
            map = L.map('map').setView([20, 78], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        }

        // Load initial bus data
        async function loadBusData() {
            try {
                const response = await fetch('/api/v1/tracking/buses/');
                const data = await response.json();
                console.log('Bus data loaded:', data);
                
                if (data.results) {
                    data.results.forEach(bus => {
                        busData[bus.bus_id] = bus;
                        renderBusItem(bus);
                        if (bus.latest_location) {
                            addBusMarker(bus);
                        }
                    });
                }

                updateStats();
            } catch (error) {
                console.error('Error loading bus data:', error);
            }
        }

        // Render bus item in sidebar
        function renderBusItem(bus) {
            const busListEl = document.getElementById('busList');
            const busDiv = document.createElement('div');
            busDiv.className = 'bus-item';
            if (selectedBusId === bus.bus_id) {
                busDiv.classList.add('active');
            }
            busDiv.id = `bus-${bus.bus_id}`;

            const status = bus.bus_status || 'idle';
            const locationStr = bus.latest_location ? 
                `${bus.latest_location.latitude.toFixed(4)}, ${bus.latest_location.longitude.toFixed(4)}` :
                'No location';

            busDiv.innerHTML = `
                <div class="bus-number">${bus.bus_number}</div>
                <div class="bus-info"><i class="fas fa-road"></i> Route: ${bus.bus_route}</div>
                <div class="bus-info"><i class="fas fa-map-pin"></i> ${locationStr}</div>
                <span class="bus-status ${status}">${status.toUpperCase()}</span>
            `;

            busDiv.onclick = () => selectBus(bus);
            busListEl.appendChild(busDiv);
        }

        // Select bus
        function selectBus(bus) {
            selectedBusId = bus.bus_id;
            
            // Update UI
            document.querySelectorAll('.bus-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`bus-${bus.bus_id}`).classList.add('active');

            // Center map on bus
            if (bus.latest_location) {
                const loc = Bus.latest_location;
                map.setView([loc.latitude, loc.longitude], 13);
                busMarkers[bus.bus_id].openPopup();
            }

            // Show info panel
            showInfoPanel(bus);
        }

        // Add bus marker to map
        function addBusMarker(bus) {
            if (!bus.latest_location) return;

            const loc = bus.latest_location;
            const busIcon = L.divIcon({
                html: `<div style="background: #667eea; color: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer;">
                    <i class="fas fa-bus" style="font-size: 20px;"></i>
                </div>`,
                iconSize: [40, 40],
                className: 'bus-marker'
            });

            const marker = L.marker([loc.latitude, loc.longitude], { icon: busIcon })
                .addTo(map)
                .bindPopup(`
                    <div class="marker-popup">
                        <h4>${bus.bus_number}</h4>
                        <p><strong>Route:</strong> ${bus.bus_route}</p>
                        <p><strong>Speed:</strong> ${loc.speed} km/h</p>
                        <p><strong>Status:</strong> ${bus.bus_status}</p>
                        <p><strong>Updated:</strong> ${new Date(loc.timestamp).toLocaleTimeString()}</p>
                    </div>
                `);

            busMarkers[bus.bus_id] = marker;

            // Add route if available
            if (bus.routes && bus.routes.length > 0) {
                addRoutePolyline(bus);
            }
        }

        // Add route polyline
        function addRoutePolyline(bus) {
            if (!bus.routes || bus.routes.length === 0) return;
            
            const route = bus.routes[0];
            if (!route.route_stops) return;

            try {
                const stops = typeof route.route_stops === 'string' ? 
                    JSON.parse(route.route_stops) : route.route_stops;
                
                const coordinates = stops.map(stop => [stop.lat, stop.lng]);
                
                if (coordinates.length > 0) {
                    const polyline = L.polyline(coordinates, {
                        color: '#667eea',
                        weight: 2,
                        opacity: 0.7,
                        dashArray: '5, 5'
                    }).addTo(map);

                    routePolylines[bus.bus_id] = polyline;
                }
            } catch (error) {
                console.error('Error rendering route:', error);
            }
        }

        // Show info panel
        function showInfoPanel(bus) {
            const panel = document.getElementById('infoPanel');
            const title = document.getElementById('infoPanelTitle');
            const content = document.getElementById('infoPanelContent');

            title.textContent = `${bus.bus_number} - Details`;

            const loc = bus.latest_location || {};
            content.innerHTML = `
                <div class="info-item">
                    <span class="info-item-label">Route:</span>
                    <span class="info-item-value">${bus.bus_route}</span>
                </div>
                <div class="info-item">
                    <span class="info-item-label">Status:</span>
                    <span class="info-item-value">${bus.bus_status}</span>
                </div>
                <div class="info-item">
                    <span class="info-item-label">Latitude:</span>
                    <span class="info-item-value">${loc.latitude?.toFixed(4) || 'N/A'}</span>
                </div>
                <div class="info-item">
                    <span class="info-item-label">Longitude:</span>
                    <span class="info-item-value">${loc.longitude?.toFixed(4) || 'N/A'}</span>
                </div>
                <div class="info-item">
                    <span class="info-item-label">Speed:</span>
                    <span class="info-item-value">${loc.speed || 0} km/h</span>
                </div>
                ${bus.conductor ? `
                    <div class="info-item">
                        <span class="info-item-label">Conductor:</span>
                        <span class="info-item-value">${bus.conductor.conductor_name}</span>
                    </div>
                ` : ''}
            `;

            panel.style.display = 'block';
        }

        // Update statistics
        function updateStats() {
            const activeBuses = Object.values(busData).filter(b => b.bus_status === 'active').length;
            document.getElementById('activeCount').textContent = activeBuses;
            
            const totalChildren = Object.values(busData).reduce((sum, bus) => {
                return sum + (bus.locations || []).length;
            }, 0);
            document.getElementById('childrenCount').textContent = totalChildren;

            if (Object.keys(busData).length === 0) {
                document.getElementById('noBuses').style.display = 'block';
            }
        }

        // Center map on all buses
        function centerMap() {
            const group = new L.featureGroup(Object.values(busMarkers));
            if (group.getLayers().length > 0) {
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        // Toggle route visibility
        function toggleRoutes() {
            showRoutes = !showRoutes;
            Object.values(routePolylines).forEach(polyline => {
                if (showRoutes) {
                    polyline.addTo(map);
                } else {
                    map.removeLayer(polyline);
                }
            });
        }

        // Refresh data
        function refreshData() {
            document.getElementById('busList').innerHTML = '';
            busMarkers = {};
            routePolylines = {};
            loadBusData();
        }

        // WebSocket real-time updates
        function initializeWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/admin/dashboard/`;
            
            const socket = new WebSocket(wsUrl);

            socket.onopen = function() {
                console.log('WebSocket connected');
                socket.send(JSON.stringify({type: 'request_update'}));
            };

            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.type === 'bus_location_update') {
                    updateBusLocation(data.data);
                } else if (data.type === 'bus_status_change') {
                    updateBusStatus(data.bus_id, data.status);
                }
            };

            socket.onerror = function(error) {
                console.error('WebSocket error:', error);
            };

            socket.onclose = function() {
                console.log('WebSocket disconnected. Reconnecting in 5 seconds...');
                setTimeout(initializeWebSocket, 5000);
            };
        }

        // Update bus location from WebSocket
        function updateBusLocation(locationData) {
            const busId = locationData.bus;
            if (busMarkers[busId]) {
                const marker = busMarkers[busId];
                marker.setLatLng([locationData.latitude, locationData.longitude]);
            }
        }

        // Update bus status
        function updateBusStatus(busId, status) {
            if (busData[busId]) {
                busData[busId].bus_status = status;
                const busItem = document.getElementById(`bus-${busId}`);
                if (busItem) {
                    const statusEl = busItem.querySelector('.bus-status');
                    statusEl.className = `bus-status ${status}`;
                    statusEl.textContent = status.toUpperCase();
                }
            }
        }

        // Initialize on page load
        window.addEventListener('load', function() {
            initializeMap();
            loadBusData();
            initializeWebSocket();
            
            // Refresh data every 5 seconds
            setInterval(loadBusData, 5000);
        });
    </script>
</body>
</html>
